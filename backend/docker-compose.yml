services:
  postgres:
    image: postgres:16
    container_name: fleta-postgres
    environment:
      POSTGRES_DB: fleta_closet
      POSTGRES_USER: fleta
      POSTGRES_PASSWORD: fleta1234
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
